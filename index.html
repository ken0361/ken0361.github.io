<!DOCTYPE html>
<html lang="en">

<head>
    <title>Life Tool</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Load Require CSS -->
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font CSS -->
    <link href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css" rel="stylesheet">
    <!-- Font Awesome (icons used by theme toggle) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Site styles (shared dark-mode rules) -->
    <link href="assets/css/site.css" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <nav id="main_nav" class="navbar navbar-expand-lg navbar-light bg-white shadow">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="navbar-brand h1">
                <a style="text-decoration: none;">
                    <span class="text-dark h3">Life Tool</span>
                </a>
                <img id="logoImg" src="assets/img/bala.jpg" class="rounded-circle mr-1" alt="Logo" width="40" height="40" style="cursor: pointer;">
                <img id="logoImg" src="assets/img/meow.jpg" class="rounded-circle mr-1" alt="Logo" width="40" height="40" style="cursor: pointer;">
            </div>
            <button id="themeToggle" class="btn btn-outline-secondary" title="切換主題">
                <i id="themeIcon" class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Action buttons: centered, with icons and improved styling -->
        <div class="mb-3 action-buttons d-flex justify-content-center flex-wrap">
            <a class="btn btn-primary rounded-pill action-btn mb-2" href="trip.html">
                <i class="fas fa-route" aria-hidden="true"></i>
                <span>東京行</span>
            </a>
            <a class="btn btn-primary rounded-pill action-btn mb-2" href="board.html">
                <i class="fas fa-clipboard" aria-hidden="true"></i>
                <span>刮刮樂</span>
            </a>
        </div>
    </div>


    <!-- Bootstrap -->
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <!-- FireBase -->
    <script src="https://code.jquery.com/jquery-3.3.1.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8="
    crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.5.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.5.0/firebase-database.js"></script>
    <!-- JS -->
    <script>
        // Theme toggle for index.html
        function _initThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const htmlElement = document.documentElement;
            const savedTheme = localStorage.getItem('theme') || 'light';

            if (savedTheme === 'dark') {
                htmlElement.setAttribute('data-bs-theme', 'dark');
                themeIcon.className = 'fas fa-sun';
            } else {
                htmlElement.setAttribute('data-bs-theme', 'light');
                themeIcon.className = 'fas fa-moon';
            }

            if (!themeToggle) return;
            if (themeToggle.__bound) return;
            themeToggle.__bound = true;

            themeToggle.addEventListener('click', function() {
                const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                htmlElement.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                themeIcon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            });
        }

        $(document).ready(function () {
            _initThemeToggle();
        });
    </script>
</body>

</html>
