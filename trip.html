<!DOCTYPE html>
<html lang="en">

<head>
	<title>Trip</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="assets/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link href="assets/css/site.css" rel="stylesheet">

	<style>
		/* Hide common delete controls when locked. Uses attribute on <html>: data-delete-lock="locked" */
		html[data-delete-lock="locked"] .requires-unlocked,
		html[data-delete-lock="locked"] [data-delete],
		html[data-delete-lock="locked"] [data-action="delete"],
		html[data-delete-lock="locked"] .delete-btn,
		html[data-delete-lock="locked"] .btn-delete,
		html[data-delete-lock="locked"] .fa-trash {
			display: none !important;
		}
	</style>
</head>

<body>
	<!-- Header (same as index.html) -->
	<nav id="main_nav" class="navbar navbar-expand-lg navbar-light bg-white shadow">
		<div class="container d-flex justify-content-between align-items-center">
			<div class="navbar-brand h1">
				<a style="text-decoration: none;">
					<span class="text-dark h3"></span>
				</a>
				<img id="logoImg" src="assets/img/東京地鐵.png" class="rounded-circle mr-1" alt="Logo" width="40" height="40" style="cursor: pointer;">
			</div>
			<div class="d-flex align-items-center">
				<!-- Lock toggle: when unlocked, delete controls are visible -->
				<button id="deleteLockToggle" class="btn btn-outline-secondary me-2" title="解鎖以顯示刪除控制">
					<i id="deleteLockIcon" class="fas fa-lock"></i>
				</button>
				<button id="themeToggle" class="btn btn-outline-secondary" title="切換主題">
					<i id="themeIcon" class="fas fa-moon"></i>
				</button>
			</div>
		</div>
	</nav>

	<div class="container py-4">
		<div class="row mb-4 gx-2">
			<div class="col-6">
				<div class="card h-100">
					<div class="card-body">
						<div class="d-flex justify-content-between align-items-start">
							<small id="taiwanDate" class="small text-muted"> </small>
							<small class="fw-semibold">台灣</small>
						</div>
						<p id="taiwanTime" class="h3 text-center my-3">--:--:--</p>
					</div>
				</div>
			</div>
			<div class="col-6">
				<div class="card h-100">
					<div class="card-body">
						<div class="d-flex justify-content-between align-items-start">
							<small id="japanDate" class="small text-muted"> </small>
							<small class="fw-semibold">日本</small>
						</div>
						<p id="japanTime" class="h3 text-center my-3">--:--:--</p>
					</div>
				</div>
			</div>
		</div>

		<!-- Dynamic tabs for trip days; tabs managed from Firestore -->
		<div class="d-flex align-items-center justify-content-between">
			<div class="trip-days-wrapper me-2 position-relative">
				<button class="trip-scroll-btn trip-scroll-prev" aria-label="向左捲動" title="向左捲動"><i class="fas fa-chevron-left"></i></button>
				<div class="trip-days-scroll">
					<ul class="nav nav-tabs" id="tripDaysTabs" role="tablist"></ul>
				</div>
				<button class="trip-scroll-btn trip-scroll-next" aria-label="向右捲動" title="向右捲動"><i class="fas fa-chevron-right"></i></button>
				</div>
			<div class="ms-2 d-flex align-items-center flex-shrink-0">
				<button class="btn btn-sm btn-outline-primary btn-icon me-2" aria-label="新增日期" onclick="tripApp.openAddDayModal()"><i class="fas fa-plus"></i></button>
				<button id="toggleExpenseBtn" class="btn btn-sm btn-outline-secondary btn-icon" aria-label="切換花費" title="切換花費">
					<i id="toggleExpenseIcon" class="fas fa-dollar-sign" style="color:#d4af37;"></i>
				</button>
			</div>
		</div>
		<div class="tab-content p-3 border border-top-0" id="tripTabsContent">
			<!-- Dynamic panes will be rendered here by trip.js -->
		</div>

		<!-- Expenses panel (hidden by default) -->
		<div id="expensesContent" class="p-3 border border-top-0" style="display:none;">
			<div class="d-flex align-items-start justify-content-between mb-2">
				<h5 class="mb-0">花費紀錄</h5>
				<div>
					<button class="btn btn-sm btn-primary btn-icon" aria-label="新增花費" title="新增花費" onclick="tripApp.openExpenseModal()"><i class="fas fa-plus"></i></button>
				</div>
			</div>
			<div class="card">
				<div class="card-body">
					<div id="expensesSummary" class="mb-3">
						<!-- per-person summary injected here -->
					</div>
					<div id="expensesList" style="max-height:320px; overflow:auto;">
						<!-- expense items injected here -->
					</div>
				</div>
			</div>
		</div>

		<!-- Expense Modal -->
		<div class="modal fade" id="expenseModal" tabindex="-1" aria-labelledby="expenseModalLabel" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">
					<form id="expenseForm">
						<div class="modal-header">
							<h5 class="modal-title" id="expenseModalLabel">新增花費</h5>
							<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
						</div>
						<div class="modal-body">
							<input type="hidden" id="expenseId" />
							<div class="mb-3">
								<label class="form-label">日期時間</label>
								<input id="expenseDateTime" name="datetime" type="datetime-local" class="form-control" required />
							</div>
							<div class="mb-3">
								<label class="form-label">金額</label>
								<div class="d-flex align-items-start gap-2">
									<input id="expenseAmount" name="amount" type="number" step="0.01" class="form-control" required />
									<div class="form-check" style="margin-top:6px;">
										<input class="form-check-input" type="checkbox" id="expenseIsJPY">
										<label class="form-check-label small" for="expenseIsJPY">日幣 (¥)</label>
									</div>
								</div>
								</div>
								<div class="mb-3">
									<label class="form-label">內容</label>
									<textarea id="expenseNote" name="note" class="form-control" rows="2" placeholder="例如：晚餐、計程車等" required></textarea>
								</div>
							<div class="mb-3">
								<label class="form-label">出錢人</label>
								<select id="expensePayer" name="payer" class="form-select">
									<option>Wade</option>
									<option>Donna</option>
									<option>Ken</option>
									<option>Sandy</option>
								</select>
							</div>
							<div class="mb-3">
								<label class="form-label">分攤人</label>
								<div>
									<div class="form-check form-check-inline"><input class="form-check-input expense-sharer" type="checkbox" id="sharerWade" value="Wade" checked><label class="form-check-label" for="sharerWade">Wade</label></div>
									<div class="form-check form-check-inline"><input class="form-check-input expense-sharer" type="checkbox" id="sharerDonna" value="Donna" checked><label class="form-check-label" for="sharerDonna">Donna</label></div>
									<div class="form-check form-check-inline"><input class="form-check-input expense-sharer" type="checkbox" id="sharerKen" value="Ken" checked><label class="form-check-label" for="sharerKen">Ken</label></div>
									<div class="form-check form-check-inline"><input class="form-check-input expense-sharer" type="checkbox" id="sharerSandy" value="Sandy" checked><label class="form-check-label" for="sharerSandy">Sandy</label></div>
								</div>
							</div>
						</div>
						<div class="modal-footer">
							<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
							<button type="submit" class="btn btn-primary">儲存</button>
						</div>
					</form>
				</div>
			</div>
		</div>

	</div>

	<!-- Scripts -->
	<script src="https://code.jquery.com/jquery-3.3.1.min.js" crossorigin="anonymous"></script>
	<script src="assets/js/bootstrap.bundle.min.js"></script>

	<!-- Add Trip Item Modal -->
	<div class="modal fade" id="tripItemModal" tabindex="-1" aria-labelledby="tripItemModalLabel" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">
				<form id="tripItemForm">
					<div class="modal-header">
						<h5 class="modal-title" id="tripItemModalLabel">新增行程項目</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<input type="hidden" id="tripItemDate" name="date" />
						<input type="hidden" id="tripItemId" name="id" />
						<div class="mb-3">
							<label class="form-label">時間</label>
							<input id="tripItemTime" name="time" type="time" class="form-control" />
						</div>
						<div class="mb-3">
							<label class="form-label">標題</label>
							<input id="tripItemTitle" name="title" type="text" class="form-control" required />
						</div>
						<div class="mb-3">
							<label class="form-label">描述</label>
							<textarea id="tripItemDesc" name="description" class="form-control" rows="3"></textarea>
						</div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
						<button type="submit" class="btn btn-primary">新增</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<script>
		// Theme toggle (same logic as index)
		function _initThemeToggle() {
			const themeToggle = document.getElementById('themeToggle');
			const themeIcon = document.getElementById('themeIcon');
			const htmlElement = document.documentElement;
			const savedTheme = localStorage.getItem('theme') || 'light';

			if (savedTheme === 'dark') {
				htmlElement.setAttribute('data-bs-theme', 'dark');
				themeIcon.className = 'fas fa-sun';
			} else {
				htmlElement.setAttribute('data-bs-theme', 'light');
				themeIcon.className = 'fas fa-moon';
			}

			if (!themeToggle) return;
			if (themeToggle.__bound) return;
			themeToggle.__bound = true;

			themeToggle.addEventListener('click', function() {
				const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
				const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
				htmlElement.setAttribute('data-bs-theme', newTheme);
				localStorage.setItem('theme', newTheme);
				themeIcon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
			});
		}

		// Delete-lock toggle: controls visibility of delete controls across the page
		function _initDeleteLock() {
			const toggle = document.getElementById('deleteLockToggle');
			const icon = document.getElementById('deleteLockIcon');
			const htmlEl = document.documentElement;
			if (!toggle || !icon) return;

			// state stored as 'locked' or 'unlocked'
			let state = localStorage.getItem('deleteLock') || 'locked';
			htmlEl.setAttribute('data-delete-lock', state);
			icon.className = state === 'unlocked' ? 'fas fa-lock-open' : 'fas fa-lock';
			toggle.title = state === 'unlocked' ? '已解鎖：刪除控制可見，點擊以鎖定' : '已鎖定：刪除控制隱藏，點擊以解鎖';

			if (toggle.__bound) return;
			toggle.__bound = true;
			toggle.addEventListener('click', function() {
				state = htmlEl.getAttribute('data-delete-lock') === 'unlocked' ? 'locked' : 'unlocked';
				htmlEl.setAttribute('data-delete-lock', state);
				localStorage.setItem('deleteLock', state);
				icon.className = state === 'unlocked' ? 'fas fa-lock-open' : 'fas fa-lock';
				toggle.title = state === 'unlocked' ? '已解鎖：刪除控制可見，點擊以鎖定' : '已鎖定：刪除控制隱藏，點擊以解鎖';
			});
		}

		// Update Taiwan and Japan times (24-hour)
		function updateTimes() {
			const now = new Date();
			const timeOpts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
			const taiwanFmt = new Intl.DateTimeFormat('zh-TW', Object.assign({}, timeOpts, { timeZone: 'Asia/Taipei' }));
			const japanFmt = new Intl.DateTimeFormat('ja-JP', Object.assign({}, timeOpts, { timeZone: 'Asia/Tokyo' }));

			function formatDateTZ(timeZone) {
				const parts = new Intl.DateTimeFormat('en-GB', { timeZone: timeZone, year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(new Date());
				let y = '', m = '', d = '';
				parts.forEach(p => {
					if (p.type === 'year') y = p.value;
					if (p.type === 'month') m = p.value;
					if (p.type === 'day') d = p.value;
				});
				return `${y}/${m}/${d}`;
			}

			const tElem = document.getElementById('taiwanTime');
			const jElem = document.getElementById('japanTime');
			const tDateElem = document.getElementById('taiwanDate');
			const jDateElem = document.getElementById('japanDate');
			if (tElem) tElem.textContent = taiwanFmt.format(now);
			if (jElem) jElem.textContent = japanFmt.format(now);
			if (tDateElem) tDateElem.textContent = formatDateTZ('Asia/Taipei');
			if (jDateElem) jDateElem.textContent = formatDateTZ('Asia/Tokyo');
		}

		document.addEventListener('DOMContentLoaded', function() {
			_initThemeToggle();
			_initDeleteLock();
			updateTimes();
			setInterval(updateTimes, 1000);
		});
	</script>

	<!-- Trip app module -->
	<!-- Provide a minimal stub so inline onclick won't throw before module loads -->
	<script>
		window.tripApp = window.tripApp || {};
		(function(app) {
			app.openAddDayModal = app.openAddDayModal || function() {
				const modalEl = document.getElementById('tripDayModal');
				if (modalEl) new bootstrap.Modal(modalEl).show();
			};
			app.openAddModal = app.openAddModal || function(date) {
				const modalEl = document.getElementById('tripItemModal');
				if (modalEl) {
					document.getElementById('tripItemDate').value = date || '';
					document.getElementById('tripItemId').value = '';
					new bootstrap.Modal(modalEl).show();
				}
			};
			app.openEditModal = app.openEditModal || function(id, dayKey) {
				const modalEl = document.getElementById('tripItemModal');
				if (modalEl) {
					document.getElementById('tripItemId').value = id || '';
					document.getElementById('tripItemDate').value = dayKey || '';
					new bootstrap.Modal(modalEl).show();
				}
			};
			app.deleteItem = app.deleteItem || function() { return; };
			app.deleteDay = app.deleteDay || function() { return; };
		})(window.tripApp);
	</script>
	<script type="module" src="assets/js/trip.js"></script>

	<script>
		// Scroll controls for trip days tabs
		document.addEventListener('DOMContentLoaded', function() {
			const sc = document.querySelector('.trip-days-scroll');
			const prevBtn = document.querySelector('.trip-scroll-prev');
			const nextBtn = document.querySelector('.trip-scroll-next');
			const tabs = document.getElementById('tripDaysTabs');
			if (!sc || !prevBtn || !nextBtn || !tabs) return;

			function updateButtons() {
				// show/hide based on overflow
				const need = sc.scrollWidth > sc.clientWidth + 1;
				if (!need) {
					prevBtn.style.display = 'none';
					nextBtn.style.display = 'none';
					return;
				}
				prevBtn.style.display = sc.scrollLeft > 0 ? 'inline-flex' : 'none';
				nextBtn.style.display = (sc.scrollLeft + sc.clientWidth) < sc.scrollWidth - 1 ? 'inline-flex' : 'none';
			}

			prevBtn.addEventListener('click', function() {
				sc.scrollBy({ left: -200, behavior: 'smooth' });
			});
			nextBtn.addEventListener('click', function() {
				sc.scrollBy({ left: 200, behavior: 'smooth' });
			});

			sc.addEventListener('scroll', updateButtons);
			window.addEventListener('resize', updateButtons);

			// If tabs are dynamically changed, observe and update
			const mo = new MutationObserver(function() {
				setTimeout(updateButtons, 50);
			});
			mo.observe(tabs, { childList: true, subtree: true });

			// initial update
			setTimeout(updateButtons, 100);
		});
	</script>

	<!-- Add Day Modal -->
	<div class="modal fade" id="tripDayModal" tabindex="-1" aria-labelledby="tripDayModalLabel" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">
				<form id="tripDayForm">
					<div class="modal-header">
						<h5 class="modal-title" id="tripDayModalLabel">新增日期</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<div class="mb-3">
							<label class="form-label">顯示標籤</label>
							<input id="tripDayLabel" name="label" type="text" class="form-control" placeholder="例如：3/16(一)" required />
						</div>

					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
						<button type="submit" class="btn btn-primary">新增</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<script>
		// Toggle between trip tabs and expenses view; swap icon between $ and calendar
		document.addEventListener('DOMContentLoaded', function() {
			const btn = document.getElementById('toggleExpenseBtn');
			const icon = document.getElementById('toggleExpenseIcon');
			const tripPane = document.getElementById('tripTabsContent');
			const expPane = document.getElementById('expensesContent');
			if (!btn || !icon || !tripPane || !expPane) return;
			btn.addEventListener('click', function() {
				const showingExpenses = expPane.style.display !== 'none';
				if (showingExpenses) {
					expPane.style.display = 'none';
					tripPane.style.display = '';
					icon.className = 'fas fa-dollar-sign';
					btn.setAttribute('title', '切換花費');
				} else {
					expPane.style.display = '';
					tripPane.style.display = 'none';
					icon.className = 'fas fa-calendar-alt';
					btn.setAttribute('title', '切換日曆');
				}
			});
		});
	</script>

	<!-- Map Modal: show Tokyo subway map centered -->
	<div class="modal fade" id="mapModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered modal-lg">
			<div class="modal-content bg-transparent border-0">
				<div class="modal-body p-0 text-center">
					<button type="button" class="btn-close position-absolute top-0 end-0 m-2" data-bs-dismiss="modal" aria-label="Close"></button>
					<img id="mapModalImg" src="" alt="東京地鐵" class="img-fluid rounded" style="max-height:80vh; display:inline-block;">
				</div>
			</div>
		</div>
	</div>

	<script>
		// Bind click on top-left logo to open centered modal showing the image
		document.addEventListener('DOMContentLoaded', function() {
			const logo = document.getElementById('logoImg');
			const mapModalEl = document.getElementById('mapModal');
			const mapModalImg = document.getElementById('mapModalImg');
			if (!logo || !mapModalEl || !mapModalImg) return;
			if (logo.__mapHandlerBound) return;
			logo.__mapHandlerBound = true;
			logo.addEventListener('click', function() {
				mapModalImg.src = logo.src;
				new bootstrap.Modal(mapModalEl).show();
			});
		});
	</script>
</body>

</html>
